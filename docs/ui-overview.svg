<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 480" role="img" aria-label="Paperclip Observability plugin UI overview">
  <defs>
    <style>
      .bg { fill: #0f1419; }
      .panel { fill: #1a2332; stroke: #3d4f66; stroke-width: 1.5; }
      .accent { fill: #3b82f6; }
      .muted { fill: #64748b; }
      .text { fill: #e2e8f0; font-family: system-ui, sans-serif; font-size: 13px; }
      .label { fill: #94a3b8; font-family: system-ui, sans-serif; font-size: 11px; }
      .title { fill: #f8fafc; font-family: system-ui, sans-serif; font-size: 16px; font-weight: 600; }
    </style>
  </defs>
  <rect class="bg" width="920" height="480" rx="8"/>
  <!-- Paperclip shell -->
  <rect class="panel" x="16" y="16" width="888" height="448" rx="6"/>
  <text class="label" x="32" y="40">Paperclip host</text>
  <!-- Sidebar -->
  <rect class="panel" x="32" y="56" width="160" height="392" rx="4"/>
  <text class="label" x="48" y="80">Sidebar</text>
  <rect class="accent" x="48" y="96" width="128" height="28" rx="4"/>
  <text class="text" x="60" y="115">Observability</text>
  <text class="muted" x="48" y="150" font-family="system-ui" font-size="11">& other nav</text>
  <!-- Main content -->
  <rect class="panel" x="208" y="56" width="680" height="392" rx="4"/>
  <text class="title" x="228" y="88">Observability</text>
  <text class="label" x="228" y="108">/:company/observability</text>
  <!-- Status row -->
  <rect class="panel" x="228" y="124" width="120" height="32" rx="4"/>
  <text class="text" x="244" y="145">OK</text>
  <rect class="panel" x="360" y="124" width="140" height="32" rx="4"/>
  <text class="text" x="376" y="145">grafana</text>
  <!-- Config section -->
  <rect class="panel" x="228" y="172" width="640" height="100" rx="4"/>
  <text class="label" x="244" y="194">Provider configuration</text>
  <rect class="panel" x="244" y="206" width="200" height="24" rx="3"/>
  <text class="text" x="252" y="222">Grafana ¾</text>
  <rect class="panel" x="244" y="238" width="360" height="24" rx="3"/>
  <text class="text" x="252" y="254">https://grafana.example.com</text>
  <!-- Grafana embed -->
  <rect class="panel" x="228" y="288" width="640" height="144" rx="4"/>
  <text class="label" x="244" y="310">Grafana (iframe embed, kiosk mode)</text>
  <rect class="muted" x="244" y="322" width="608" height="96" rx="3" opacity="0.35"/>
  <text class="muted" x="420" y="372" font-family="system-ui" font-size="12">dashboard panels</text>
</svg>
